<h1 id="distributing-mcp-servers-with-oci-to-power-agent-skills">Distributing MCP Servers With OCI To Power Agent Skills</h1>
<p><strong>Bobby House</strong><br />
Sr. Software Engineer, Docker</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="2" data-marpit-fragments="3" data-paginate="true" data-theme="docker" lang="en-US" data-marpit-pagination="2" style="--paginate:true;--theme:docker;" data-marpit-pagination-total="18">
<h2 id="motivation">Motivation</h2>
<p>An agent skill is a markdown file. It references tools by name. Those tools are provided by MCP servers. That's a dependency — and we need a way to manage it.</p>
<p><strong>Goals</strong></p>
<ul>
<li data-marpit-fragment="1"><strong>Addressable</strong> — a single immutable reference, no drift</li>
<li data-marpit-fragment="2"><strong>Configurable</strong> — configuration must be part of the dependency, set by the skill author or deferred to the user</li>
<li data-marpit-fragment="3"><strong>Decoupled</strong> — MCP servers should have their own versioning and release cycle, referenced as dependencies rather than bundled with the skill</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="3" data-marpit-fragments="2" data-paginate="true" data-theme="docker" lang="en-US" data-marpit-pagination="3" style="--paginate:true;--theme:docker;" data-marpit-pagination-total="18">
<h2 id="why-not-mcpjson">Why not <code>.mcp.json</code>?</h2>
<p>The obvious first approach — ship an <code>.mcp.json</code> with the skill listing the MCP servers it needs.</p>
<p><strong>Two problems a dependency shouldn't have</strong></p>
<ul>
<li data-marpit-fragment="1"><strong>It defines runtime</strong> — an execution model, not a dependency declaration</li>
<li data-marpit-fragment="2"><strong>Configuration is static</strong> — cannot be deferred to the user</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="4" data-marpit-fragments="3" data-paginate="true" data-theme="docker" lang="en-US" data-marpit-pagination="4" style="--paginate:true;--theme:docker;" data-marpit-pagination-total="18">
<h2 id="why-not-serverjson">Why not <code>server.json</code>?</h2>
<p>The file needs modification — the schema is closer, but has gaps.</p>
<ul>
<li data-marpit-fragment="1">Tags may need resolving to digests <em>(Addressable)</em></li>
<li data-marpit-fragment="2">We want to supply or override values <em>(Configurable)</em></li>
<li data-marpit-fragment="3"><code>isRequired</code>, <code>default</code>, <code>placeholder</code> ≠ &quot;who provides this value?&quot;</li>
</ul>
<p>Worth exploring — feels very close.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="5" data-paginate="true" data-theme="docker" lang="en-US" data-marpit-pagination="5" style="--paginate:true;--theme:docker;" data-marpit-pagination-total="18">
<h2 id="authoring">Authoring</h2>
<p>Let's build a skill. The dependency is a profile — a YAML manifest packaged as an OCI artifact and stored in a registry.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="6" data-paginate="true" data-theme="docker" lang="en-US" data-marpit-pagination="6" style="--paginate:true;--theme:docker;" data-marpit-pagination-total="18">
<h2 id="example">Example</h2>
<p>Invoking skill-builder to create a meditations skill — server dependencies are resolved and packed into an OCI artifact:</p>
<pre><code>Use skill-builder

name: meditations

short-description: get a passage from marcus aurelius meditations

details: use io.github.bobbyhouse.project-gutenberg-mcp@1.2.0 and io.github.bobbyhouse.append-log-mcp@1.0.0 to get
passages from meditations and use log to see if we have already seen that passage. If we have already seen that passage
get another passage, we only care that we haven't seen the same passage within the last 30 days. With the raw passage
text, provide just a small excerpt that includes the original text and a terse interpretation
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="7" data-paginate="true" data-theme="docker" lang="en-US" data-marpit-pagination="7" style="--paginate:true;--theme:docker;" data-marpit-pagination-total="18">
<h2 id="list-of-servers">List of servers</h2>
<p><em>(Goal: Addressable + Decoupled)</em></p>
<pre class="mermaid">
sequenceDiagram
    participant SB as Skill Builder
    participant Registry as MCP Registry
    participant OCI as OCI Registry
    participant Artifact as OCI Artifact

    SB-&gt;&gt;Registry: lookup server-name + version
    Registry--&gt;&gt;SB: docker.io/owner/server:v1.0.0

    SB-&gt;&gt;OCI: resolve docker.io/owner/server:v1.0.0
    OCI--&gt;&gt;SB: docker.io/owner/server@sha256:abc123…

    SB-&gt;&gt;Artifact: store server@sha256:abc123…
</pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="8" data-paginate="true" data-theme="docker" lang="en-US" data-marpit-pagination="8" style="--paginate:true;--theme:docker;" data-marpit-pagination-total="18">
<h2 id="configuration">Configuration</h2>
<p><em>(Goal: Configurable)</em></p>
<p>Configuration with values either specified by the skill author or explicitly left for the user to supply.</p>
<pre><code>1 name: meditations-profile
2 servers:
3   - name: io.github.bobbyhouse/project-gutenberg-mcp
4     identifier: roberthouse224/project-gutenberg-mcp@sha256:6460cba7b27343be72a85cbf5484e024711eb3...
5     config:
6       GUTENBERG_BASE_URL: # undefined — user supplies this
7       GUTENBERG_TOOLS: list_passages,get_passage
8       GUTENBERG_BOOK_ID: &quot;2680&quot;
9   - name: io.github.bobbyhouse/append-log-mcp
10     identifier: roberthouse224/append-log-mcp@sha256:5008d346d8c653caab0309999e694a2a63cf3b2c3bcb7...
11     config:
12       APPEND_LOG_TOOLS: append,query
13       APPEND_LOG_FILE: /data/log.jsonl 
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="9" data-paginate="true" data-theme="docker" lang="en-US" data-marpit-pagination="9" style="--paginate:true;--theme:docker;" data-marpit-pagination-total="18">
<h2 id="single-dependency">Single Dependency</h2>
<pre class="mermaid">
flowchart LR
    Ref(["registry/ns/profile@sha256:abc"])

    subgraph Image["OCI Artifact"]
        S1["server-a@sha256:111...\nconfig: KEY=val, KEY2="]
        S2["server-b@sha256:222...\nconfig: KEY=val"]
    end

    Ref --&gt; Image
</pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="10" data-paginate="true" data-theme="docker" lang="en-US" data-marpit-pagination="10" style="--paginate:true;--theme:docker;" data-marpit-pagination-total="18">
<p><video id="demo-skill-builder" src="./media/videos/skill_builder.mp4" poster="./media/images/skill_builder_thumb.png" controls autoplay loop muted width="100%" height="100%"></video></p>
<script>document.getElementById('demo-skill-builder').playbackRate = 1.5;</script>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="11" data-paginate="true" data-theme="docker" lang="en-US" data-marpit-pagination="11" style="--paginate:true;--theme:docker;" data-marpit-pagination-total="18">
<h2 id="running-the-skill">Running the Skill</h2>
<pre class="mermaid">
sequenceDiagram
    actor User
    participant Claude
    participant SKILL as SKILL.md
    participant OCI as OCI Registry
    participant FS as .mcp.json

    User-&gt;&gt;Claude: /meditations
    Claude-&gt;&gt;SKILL: load skill
    SKILL--&gt;&gt;Claude: restrictToolAccess: [4 MCP tools only]

    Claude-&gt;&gt;FS: check .mcp.json + ~/.claude/settings.json
    FS--&gt;&gt;Claude: servers not registered

    Claude-&gt;&gt;OCI: pull profile@sha256:f25e…
    OCI--&gt;&gt;Claude: server identifiers + config (GUTENBERG_BASE_URL undefined)

    Claude-&gt;&gt;User: GUTENBERG_BASE_URL is required. What is your Gutenberg base URL?
    User--&gt;&gt;Claude: http://host.docker.internal:8080

    Claude-&gt;&gt;User: Register servers at project / user / local? (default: project)
    User--&gt;&gt;Claude: project

    Claude-&gt;&gt;FS: write mcpServers to .mcp.json
    FS--&gt;&gt;Claude: saved

    User-&gt;&gt;Claude: restart Claude
    User-&gt;&gt;Claude: /meditations
</pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="12" data-paginate="true" data-theme="docker" lang="en-US" data-marpit-pagination="12" style="--paginate:true;--theme:docker;" data-marpit-pagination-total="18">
<p><video id="demo-skill" src="./media/videos/profile_no_gateway.mp4" poster="./media/images/profile_no_gateway_thumb.png" controls autoplay loop muted width="100%" height="100%"></video></p>
<script>document.getElementById('demo-skill').playbackRate = 1.5;</script>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="13" data-marpit-fragments="3" data-paginate="true" data-theme="docker" lang="en-US" data-marpit-pagination="13" style="--paginate:true;--theme:docker;" data-marpit-pagination-total="18">
<h2 id="issues">Issues</h2>
<ul>
<li data-marpit-fragment="1">No good way to &quot;load&quot; the servers</li>
<li data-marpit-fragment="2">No lifecycle management — no clean way to uninstall or reload servers</li>
<li data-marpit-fragment="3"><code>.mcp.json</code> wrangling — reading, merging, and writing config by hand is fragile</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="14" data-marpit-fragments="3" data-paginate="true" data-theme="docker" lang="en-US" data-marpit-pagination="14" style="--paginate:true;--theme:docker;" data-marpit-pagination-total="18">
<h2 id="gateway--profile-pattern">Gateway + Profile Pattern</h2>
<p>A thin, client-agnostic MCP layer that manages the runtime lifecycle of your servers.</p>
<ul>
<li data-marpit-fragment="1">Reads the profile, pulls and loads servers</li>
<li data-marpit-fragment="2">Handles what the profile alone cannot — load, reload, unload</li>
<li data-marpit-fragment="3">Opens the door to further leveraging the dependency file</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="15" data-marpit-scope-iF7rdSp6="" data-paginate="true" data-theme="docker" lang="en-US" data-marpit-pagination="15" style="--paginate:true;--theme:docker;" data-marpit-pagination-total="18">
<h2 id="running-the-skill-1">Running the Skill</h2>
<pre class="mermaid">
  sequenceDiagram
      participant S as Skill
      participant GW as Gateway
      participant R as OCI Registry
      participant D as Docker
      participant SV as MCP Server(s)

      S-&gt;&gt;GW: load(profile@sha256:..., config)
      GW-&gt;&gt;R: pull profile@sha256:...
      loop for each server in profile
          GW-&gt;&gt;D: docker run {server@sha256:...}
          GW-&gt;&gt;SV: tools/list
          SV--&gt;&gt;GW: tool schemas
      end

      GW--&gt;&gt;S: "profile loaded"

      S-&gt;&gt;GW: project-gutenberg__list_passages({...})
      GW-&gt;&gt;SV: list_passages({...})
      SV--&gt;&gt;GW: result
      GW--&gt;&gt;S: result
</pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="16" data-paginate="true" data-theme="docker" lang="en-US" data-marpit-pagination="16" style="--paginate:true;--theme:docker;" data-marpit-pagination-total="18">
<p><video id="demo" src="./media/videos/profile_gateway.mp4" poster="./media/images/profile_gateway_thumb.png" controls autoplay loop muted width="100%" height="100%"></video></p>
<script>document.getElementById('demo').playbackRate = 1.5;</script>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="17" data-marpit-fragments="3" data-paginate="true" data-theme="docker" lang="en-US" data-marpit-pagination="17" style="--paginate:true;--theme:docker;" data-marpit-pagination-total="18">
<h2 id="closing">Closing</h2>
<p>Package your MCP server dependencies as an OCI artifact:</p>
<ul>
<li data-marpit-fragment="1"><strong>Addressable</strong> — a single immutable digest, no drift</li>
<li data-marpit-fragment="2"><strong>Configurable</strong> — placeholders for values the skill author or user supplies</li>
<li data-marpit-fragment="3"><strong>Decoupled</strong> — servers version and release independently</li>
</ul>
<p><strong>Bonus:</strong> pair with a gateway for lifecycle management — load, reload, unload without touching <code>.mcp.json</code></p>
<p><em>This is essentially what we built at Docker in <a href="https://github.com/docker/mcp-gateway">MCP Gateway</a> with the Profiles feature.</em></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="18" data-paginate="true" data-theme="docker" lang="en-US" data-marpit-pagination="18" style="--paginate:true;--theme:docker;" data-marpit-pagination-total="18">
<h2 id="references">References</h2>
<p><img src="./media/images/qr.png" alt="QR Code" /></p>
